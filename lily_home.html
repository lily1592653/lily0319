<!doctype html>

    <head>

        <style type = "text/CSS">
            #wall {z-index: 1; opacity:0.8; position: fixed; top:0px; left:0px;}
            #test {z-index:2; position: relative; }
            #gnb {z-index: 3; position: fixed; top: 0px; left:0px;}
            #chat-container { z-index:4; position: fixed; width: 300px; border: 1px solid #a4ff2d; padding: 10px; bottom:70px; right:20px;}
            #chat-window { z-index:6; position: relative; height: 200px; overflow-y: scroll; border-bottom: 1px solid #b82a2a; margin-bottom: 10px; }
            #chat_title {z-index:5; position: fixed;  bottom: 340px; right:250px;}
            .bot-msg { color: blue; margin: 5px 0; }
            .user-msg { color: black; text-align: right; margin: 5px 0; }
        </style>

        
    </head>
    <body>
        <img src="https://lily-test159265.s3.ap-northeast-2.amazonaws.com/sin1.jpg" id="wall" height="1800">
        <img src="https://lily-test159265.s3.ap-northeast-2.amazonaws.com/gnb2.png" id="gnb" height="66">
        
        <h1></br></h1>
        
        <h1 id ="test">lily의 Home 입니다 **^^**</h1>
        
        <p id ="test">카페, 싱가폴 경찰서 </br>
            <img src="https://lily-test159265.s3.ap-northeast-2.amazonaws.com/cafe1.jpg" id ="test" alt="이미지 불러오기 오류" height="380">
            <img src="https://lily-test159265.s3.ap-northeast-2.amazonaws.com/sin_police.jpg" id ="test" alt="이미지 불러오기 오류" height="380">
        </p>
        <p id ="test">귀여운 빵이 </br>
            <img src="https://lily-test159265.s3.ap-northeast-2.amazonaws.com/bbang1.jpg" id ="test" alt="이미지 불러오기 오류" height="380">
            </br>
            <img src="https://lily-test159265.s3.ap-northeast-2.amazonaws.com/bbang2.jpg" id ="test" alt="이미지 불러오기 오류" width="600">
        </p>
        <p id ="test"> <a href="1차시 예제.html" title="lily 연습이었던것..">연습이었던것..</a> 
        </p>

        <div id="chat_title" class="chat-wrapper" >챗봇임당
            <div id="chat-container">
                <div id="chat-window">
                    <div id="messages"></div>
                </div>
                <input type="text" id="user-input" placeholder="메시지 입력해주세요..">
                <button onclick="sendMessage()">전송</button>
            </div>
        <div>
        <script type = "text/javascript">
        function sendMessage() {
            const input = document.getElementById('user-input');
            const messages = document.getElementById('messages');
                
            if (input.value.trim() === "") return;

            // 사용자 메시지 표시
            messages.innerHTML += `<div class="user-msg">${input.value}</div>`;
                
            // 봇 응답 로직 (간단한 규칙 기반)
            let response = "죄삼다..AI는 안됩니당..";
            if (input.value.includes("안녕")) response = "안녕하세요! 무엇을 도와드릴까요?";
                
            setTimeout(() => {
                messages.innerHTML += `<div class="bot-msg">봇: ${response}</div>`;
                messages.scrollTop = messages.scrollHeight;
            }, 500);

            input.value = "";
        }
        </script>

        </body>
</html>
