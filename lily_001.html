<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://lily-test159265.s3.ap-northeast-2.amazonaws.com/image2.png" type="image">
    <title>lily_001</title>
    <style type="text/CSS">
        @font-face {
            font-family: 'JalpulrineunHaruche';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10-21@1.0/Jal_Haru.woff') format('woff');
            font-weight: 300;
            font-display: swap;
        }
        
        .gnb_wrapper{
            width: 100%;
            text-align: center;
            display: flex;
            justify-content: center;
            
        }
        .gnb{
            width: 1280px;
            display: flex;
            justify-content: space-between;
        }
        .gnb > ul{
            display: flex;
        }
        
        .gnb > ul > li{
            list-style: none;
            display: flex;
            align-items: center;
            height:100%;
            padding: 0 10px;
            position: relative; right: 20px;
            
        }
        .gnb > ul > li > a{
            text-decoration: none;
            color: #000;
            font-family: 'JalpulrineunHaruche';
        }       
        .login{
            text-align: right;
        }
        .input_wrapper{
            width: 100%; 
            display: flex;
            justify-content: center;
            height: 40px;
            align-items: center;
        }
        .input_box{
            position: relative; left: 17px;
            width: 1280px;
            height: 35px;
            align-items: center;
            display: flex;
            padding: 0 5px;
            justify-content: left;
            
        }
        .input_box > input{
            width: 200px; height: 33px; border-radius: 10px;
            border: 1.5px solid #ccc;
            align-items: center;
            padding: 0 5px;           
        
        }
        .svg_pa{
            padding: 0 9px;
        }
        .chat_wrapper{
            width: 100%;
            text-align: center;
            display: flex;
            justify-content: center;
            
        }
        .chat_wrapper_2{
            width: 1280px;
            justify-content: center;
            padding: 0 20px;
            position: relative; left: 60px;
        }
        .chat_wrapper_2 > p{
            display: flex;
            font-family: 'JalpulrineunHaruche';
            font-size: 13pt;
            
        }
        #chatbox {
        width: 380px;
        height: 400px;
        border: 1px solid #ccc;
        padding: 0 20px;
        overflow-y: auto;
        font-family: Arial, sans-serif;
        background-color: #f9f9f9;
        border-radius: 10px;
        justify-content: left;
        }
        #userInput {
        width: 350px;
        height: 25px;
        justify-content: left;
        display: flex;
        }
        .send_btn{
            width: 45px;
            height: 30px;
        }
        .chat_wrapper_2 > ul{
            list-style: none;
            justify-content: left;
            display: flex;
            padding: 0 0px;
        }
        .chat_wrapper_2 > ul > li {
           padding: 0 5px;
        }
        .message {
        margin: 5px 0;
        }
        .botMsg {
        color: blue;
        text-align: left;
        }
        .userMsg {
        color: green;
        text-align: right;
        }
    </style>
</head>
<body>
    <div class="gnb_wrapper">
        <div class="gnb">
            <ul class="menu">
                <li><a href="#">메뉴</a></li>
                <li><a href="#">로고</a></li>
                <li><a href="lily_002.html">평가</a></li>
            </ul>
            <ul class="login">
                <li><a href="login.html">로그인/회원가입</a></li>
            </ul>
        </div>
    </div>
    <div class="input_wrapper">
        <div class="input_box">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg" class="svg_pa">
            <circle cx="12.5" cy="12.5" r="12.5" fill="#CCCCCC"/>
            <circle cx="12.5" cy="12.5" r="9.5" fill="white"/>
            <rect width="3.0122" height="5.94499" rx="1.5061" transform="matrix(0.566393 -0.824135 0.727495 0.686113 19.969 21.9211)" fill="#CCCCCC"/>
            </svg> 
            <input type="search" placeholder="검색어를 입력하세요.">
        </div>           
    </div>
    <div class="chat_wrapper">
        <div class="chat_wrapper_2">
            <p>챗봇입니당</p>
            <div id="chatbox"></div>
            <ul>
                <li><input type="text" id="userInput" placeholder="여기에 질문을 입력하세요" /></li>
                <li><button class="send_btn" onclick="sendMessage()">전송</button></li>
            </ul>
        </div>     
    </div>
    
  
    
    <script type = "text/javascript">
    async function sendMessage() {
    const inputElem = document.getElementById('userInput');
    const chatbox = document.getElementById('chatbox');
    const userText = inputElem.value.trim();
    
    if (!userText) return;

    inputElem.value = '';

    const userMsgElem = document.createElement('div');
    userMsgElem.className = 'message userMsg';
    userMsgElem.textContent = userText;
    chatbox.appendChild(userMsgElem);
    chatbox.scrollTop = chatbox.scrollHeight;

    try {
        const response = await fetch('https://92cjbpo668.execute-api.ap-northeast-2.amazonaws.com/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userMessage: userText })
        });

        const data = await response.json();

        if (!response.ok) {
        // 401 에러 등이 나면 여기서 콘솔에 구체적인 이유가 찍힙니다.
        console.error('에러 상세:', data);
        throw new Error(data.error?.message || `HTTP error! status: ${response.status}`);
        }

        // OpenAI의 표준 응답 구조에서 텍스트 추출
        const botText = data.choices[0].message.content;

        const botMsgElem = document.createElement('div');
        botMsgElem.className = 'message botMsg';
        botMsgElem.textContent = botText;
        chatbox.appendChild(botMsgElem);
        chatbox.scrollTop = chatbox.scrollHeight;

    } catch (error) {
        console.error('API 호출 실패:', error);
        const errorMsg = document.createElement('div');
        errorMsg.className = 'message errorMsg';
        errorMsg.textContent = "오류 발생: " + error.message;
        chatbox.appendChild(errorMsg);
    }
    }
  </script>
    

    
</body>
</html>
