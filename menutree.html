<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>menu 만들기</title>
    <style type = "text/CSS">
        ul { list-style: none; padding: 0; margin: 0; }
        a { text-decoration: none; color: #333; }

        .gnb-wrapper {
            width: 100%;
            background: #f5ddf3;
            border-bottom: 1px solid #ddd;
            position: fixed;
            top: 0px;
        }

        /* 주 메뉴 가로 배치 */
        .main-menu {
            display: flex;
            justify-content: right; /* center, right, left */
            
        }

        .main-menu > li {
            position: relative; /* 서브메뉴 위치의 기준점 */
            padding: 10px 30px; /* 서브 메뉴 크기 세로 가로*/
        }

        .main-menu > li > a {
            font-weight: bold;
        }

        /* 하위 메뉴 숨기기 */
        .sub-menu {
            display: none; /* 기본적으로 숨김 */
            position: absolute;
            top: 100%; /* 부모 메뉴 바로 아래 */
            left: 0;
            background: #ffffff;
            border: 1px solid #ddd;
            min-width: 150px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .sub-menu li {
            padding: 10px 15px;
        }

        .sub-menu li:hover {
            background: #cacaca;
        }

        /* 마우스 호버 시 하위 메뉴 보여주기 */
        .main-menu > li:hover .sub-menu {
            display: block;
        }
    </style>
</head>
<body>
    <nav class="gnb-wrapper">
    <div class="gnb-title">
        <h2>전체 메뉴 (메뉴 만들기 연습)</h2></div>
    
    <ul class="main-menu">
        <li>
            <a href="#">메뉴 1</a>
            <ul class="sub-menu">
                <li><a href="#">서브메뉴 1-1</a></li>
                <li><a href="#">서브메뉴 1-2</a></li>
            </ul>
        </li>
        <li>
            <a href="#">메뉴 2</a>
            <ul class="sub-menu">
                <li><a href="#">서브메뉴 2-1</a></li>
                <li><a href="#">서브메뉴 2-2</a></li>
                <li><a href="#">서브메뉴 2-3</a></li>
            </ul>
        </li>
        <li>
            <a href="#">메뉴 3</a>
            <ul class="sub-menu">
                <li><a href="#">서브메뉴 3-1</a></li>
            </ul>
        </li>
    </ul>
    <script type = "text/javascript">
        // 하위 메뉴가 나타날 때 부드럽게 하고 싶다면 
        // CSS의 display 대신 opacity와 transition을 활용하는 것이 좋지만,
        // 간단한 이벤트 처리를 위해 JS를 사용할 수 있습니다.

        const menuItems = document.querySelectorAll('.main-menu > li');

        menuItems.forEach(item => {
            item.addEventListener('mouseenter', () => {
                // 호버 시 추가 동작이 필요하다면 여기에 작성
                console.log('메뉴에 마우스가 올라갔어요!');
            });
        });
    </script>
</nav>
</body>
</html>
