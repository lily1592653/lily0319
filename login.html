<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://lily-test159265.s3.ap-northeast-2.amazonaws.com/image2.png" type="image">
    <title>login</title>
    <style type="text/CSS">
        @font-face {
            font-family: 'JalpulrineunHaruche';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10-21@1.0/Jal_Haru.woff') format('woff');
            font-weight: 300;
            font-display: swap;
        }
        .wrapper{
            /*width: 100%;*/
            justify-content: center;
            
        }
        .box{
            position: relative; top: 60px;
        width: 400px;
        height: 400px;
        border: 1px solid #ccc;
        background-color: #f0f0f0;
        border-radius: 10px;
        justify-content: center;
        padding: 0 0;
        margin: 0 auto;        
        }
        .box > p {
            font-size: 14pt;
            text-align: center;
            font-family: 'JalpulrineunHaruche';
            padding: 30px 0;
        }
        .box > ul {
            list-style: none;
            padding: 0 0;
            text-align: center;
        }
        .box > ul > li {
            padding: 8px 0;
        }
        .box > ul > li > input{
            width: 200px;
            height: 23px;
            border-radius: 5px;
            border: 0.5px solid #ccc;;
        }
        .box > ul > li > button {
            border-radius: 20px;;
            width: 100px;
            border: 0.8px solid #000000;;
            background-color: #c9e0ff;
        }

        .bottom{
            
        }
        .bottom > ul {
            display:flex;
            list-style: none;
            justify-content: center;
            padding: 20px 0;
        }
        .bottom > ul > li{
            font-size: 9pt;
            color: #7c7c7c;
            padding: 10px 5px;
        }
    </style>
    
</head>
<body>
    <div class="wrapper">
        <div class="box">
            <p>로그인</p>
            <ul>
                <li><input type="text" placeholder="ID를 입력해주세요."></li>
                <li><input type="text" placeholder="비밀번호를 입력해주세요."></li>
                <li><button>로그인</button></li>
            </ul>
            <div class="bottom">
                <ul>
                <li>회원가입</li>
                <li>|</li>
                <li>ID 찾기</li>
                <li>|</li>
                <li>비밀번호 찾기</li>
            </ul>
            </div>
            
        </div>
        
    </div>
    
</body>
</html>
